<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h2>Create Account</h2>

<form method="POST">

    <input type="text"
           name="username"
           placeholder="Username"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <input type="text"
           name="reg_key"
           placeholder="Registration Key"
           required>

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

{% if error %}
<p style="color:red;">
    {{ error }}
</p>
{% endif %}

<br>

<a href="/">Back to Login</a>

</body>
</html>
