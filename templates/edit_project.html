<!DOCTYPE html>
<html>
<head>
    <title>Edit Project</title>
</head>
<body>

<h2>Edit Project</h2>

<form method="POST">

    <input type="text"
           name="title"
           value="{{ project.title }}"
           required>
    <br><br>

    <textarea name="description">
        {{ project.description }}
    </textarea>
    <br><br>

    <input type="text"
           name="progress"
           value="{{ project.progress }}">
    <br><br>

    <button type="submit">Update</button>

</form>

</body>
</html>
